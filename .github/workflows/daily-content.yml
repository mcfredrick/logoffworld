name: Daily Content Generation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/generate_content.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit new content
        run: |
          git config user.name "people-over-tech-bot"
          git config user.email "bot@peopleovertech.pages.dev"
          git add public/data/prompts.json public/data/phrases.json scripts/used_prompts.json scripts/used_phrases.json
          git diff --cached --quiet || git commit -m "chore: daily content refresh [skip ci]"
          git push
